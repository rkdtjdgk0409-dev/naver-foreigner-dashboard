<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>외국인 순매수·순매도 TOP 10</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --card: #171a23;
      --line: #2a2f3c;
      --text: #f4f6fb;
      --muted: #a8afbf;
      --buy: rgba(239, 83, 80, 0.82);
      --sell: rgba(66, 133, 244, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      width: min(1260px, calc(100% - 16px));
      margin: 8px auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin: 0 2px 8px;
    }

    .title-group {
      min-width: 0;
    }

    h1 {
      margin: 0 0 3px;
      font-size: clamp(18px, 2.1vw, 27px);
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.35;
    }

    .updated {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11.5px;
      white-space: nowrap;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      min-width: 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px;
    }

    .card h2 {
      margin: 0 0 7px;
      font-size: 15px;
      line-height: 1.25;
    }

    /*
      차트와 표를 위아래가 아니라 좌우로 배치해서
      페이지 전체 높이를 크게 줄입니다.
    */
    .card-body {
      display: grid;
      grid-template-columns: minmax(205px, 1.12fr) minmax(180px, 0.88fr);
      gap: 8px;
      align-items: stretch;
    }

    .chart-box {
      position: relative;
      height: 270px;
      min-width: 0;
    }

    .table-box {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 10.5px;
    }

    thead {
      background: rgba(255, 255, 255, 0.035);
    }

    th,
    td {
      height: 24px;
      padding: 3px 4px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    th:first-child,
    td:first-child {
      width: 27px;
      text-align: center;
    }

    th:nth-child(2),
    td:nth-child(2) {
      width: auto;
      text-align: left;
    }

    th:nth-child(3),
    td:nth-child(3) {
      width: 54px;
    }

    th:nth-child(4),
    td:nth-child(4) {
      width: 68px;
    }

    .error {
      display: none;
      margin-bottom: 8px;
      padding: 10px;
      border: 1px solid #8f3c3c;
      background: #311c21;
      border-radius: 9px;
      font-size: 12px;
      line-height: 1.5;
    }

    footer {
      margin: 6px 2px 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
    }

    /*
      화면 폭이 조금 좁아지면 각 카드 안에서는
      차트와 표를 위아래로 배치합니다.
      노션에서는 페이지를 '전체 너비'로 설정하는 것을 권장합니다.
    */
    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card-body {
        grid-template-columns: minmax(260px, 1.25fr) minmax(210px, 0.75fr);
      }

      .chart-box {
        height: 245px;
      }
    }

    @media (max-width: 650px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 3px;
      }

      .updated {
        text-align: left;
      }

      .card-body {
        grid-template-columns: 1fr;
      }

      .chart-box {
        height: 260px;
      }

      table {
        height: auto;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <div class="title-group">
        <h1>외국인 순매수·순매도 TOP 10</h1>
        <div class="sub">
          네이버 증권 데이터를 GitHub Actions가 자동으로 갱신합니다.
        </div>
      </div>

      <div class="updated">
        마지막 갱신:
        <strong id="updated">불러오는 중…</strong>
      </div>
    </header>

    <div id="error" class="error"></div>

    <section class="grid" id="dashboard">
      <article class="card">
        <h2>외국인 순매수 TOP 10</h2>

        <div class="card-body">
          <div class="chart-box">
            <canvas id="buyChart"></canvas>
          </div>

          <div class="table-box" id="buyTable"></div>
        </div>
      </article>

      <article class="card">
        <h2>외국인 순매도 TOP 10</h2>

        <div class="card-body">
          <div class="chart-box">
            <canvas id="sellChart"></canvas>
          </div>

          <div class="table-box" id="sellTable"></div>
        </div>
      </article>
    </section>

    <footer>
      이 화면은 투자 참고용입니다. 원본 페이지의 지연·오류 또는 구조 변경으로
      자동 갱신이 실패할 수 있습니다.
    </footer>
  </main>

  <script>
    const formatNumber = new Intl.NumberFormat("ko-KR");

    /*
      기존 data.json에 들어 있는
      "관심종목 추가(0) 삼성전자" 같은 접근성 문구를 제거합니다.
      숫자 대신 다른 글자가 들어 있어도 괄호 부분까지 제거합니다.
    */
    function cleanStockName(name) {
      return String(name ?? "")
        .replace(
          /^\s*관심종목(?:에)?\s*추가(?:\s*\([^)]*\))?\s*(?:\d+\s*)?/u,
          ""
        )
        .trim();
    }

    function cleanItems(items) {
      return items.map(item => ({
        ...item,
        name: cleanStockName(item.name)
      }));
    }

    function makeTable(items) {
      const rows = items.map(item => `
        <tr>
          <td>${item.rank}</td>
          <td title="${item.name}">${item.name}</td>
          <td>${item.code || "-"}</td>
          <td title="${formatNumber.format(item.amount)}">
            ${formatNumber.format(item.amount)}
          </td>
        </tr>
      `).join("");

      return `
        <table>
          <thead>
            <tr>
              <th>순위</th>
              <th>종목</th>
              <th>코드</th>
              <th>금액</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function makeChart(canvasId, items, label, color) {
      return new Chart(document.getElementById(canvasId), {
        type: "bar",

        data: {
          labels: items.map(item => item.name),

          datasets: [{
            label,
            data: items.map(item => item.amount),
            backgroundColor: color,
            borderWidth: 0,
            borderRadius: 4,
            barPercentage: 0.76,
            categoryPercentage: 0.88
          }]
        },

        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,

          layout: {
            padding: {
              top: 0,
              right: 2,
              bottom: 0,
              left: 0
            }
          },

          plugins: {
            legend: {
              display: false
            },

            tooltip: {
              callbacks: {
                label: context =>
                  `${label}: ${formatNumber.format(context.raw)}`
              }
            }
          },

          scales: {
            x: {
              beginAtZero: true,

              grid: {
                color: "rgba(255,255,255,0.07)"
              },

              ticks: {
                color: "#a8afbf",
                font: {
                  size: 9
                },

                maxTicksLimit: 4,

                callback: value => {
                  const number = Number(value);

                  if (Math.abs(number) >= 100000000) {
                    return `${(number / 100000000).toFixed(0)}억`;
                  }

                  if (Math.abs(number) >= 10000) {
                    return `${(number / 10000).toFixed(0)}만`;
                  }

                  return formatNumber.format(number);
                }
              }
            },

            y: {
              grid: {
                display: false
              },

              ticks: {
                color: "#f4f6fb",
                autoSkip: false,
                font: {
                  size: 10
                }
              }
            }
          }
        }
      });
    }

    async function loadData() {
      try {
        const response = await fetch(`data.json?t=${Date.now()}`);

        if (!response.ok) {
          throw new Error("data.json을 불러오지 못했습니다.");
        }

        const data = await response.json();

        if (!data.buy?.length || !data.sell?.length) {
          throw new Error(
            "아직 실제 데이터가 없습니다. GitHub Actions를 먼저 실행해 주세요."
          );
        }

        const buyItems = cleanItems(data.buy);
        const sellItems = cleanItems(data.sell);

        document.getElementById("updated").textContent =
          data.updated_at;

        document.getElementById("buyTable").innerHTML =
          makeTable(buyItems);

        document.getElementById("sellTable").innerHTML =
          makeTable(sellItems);

        makeChart(
          "buyChart",
          buyItems,
          "순매수 금액",
          "rgba(239, 83, 80, 0.82)"
        );

        makeChart(
          "sellChart",
          sellItems,
          "순매도 금액",
          "rgba(66, 133, 244, 0.82)"
        );
      } catch (error) {
        document.getElementById("dashboard").style.display = "none";

        const box = document.getElementById("error");
        box.style.display = "block";
        box.innerHTML = `
          <strong>데이터를 표시하지 못했습니다.</strong><br>
          ${error.message}<br><br>
          저장소의 <b>Actions</b> 메뉴에서 자동 실행이 성공했는지 확인해 주세요.
        `;

        document.getElementById("updated").textContent = "갱신 필요";
      }
    }

    loadData();
  </script>
</body>
</html>
